<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Keren</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="todo-card">

            <img src="https://cdn-icons-png.flaticon.com/512/906/906334.png" class="todo-image">

            <h1>Catat Harian Kamu</h1>

            <div class="input-group">
                <input type="text" id="todo-input" placeholder="Tulis tugas kamu...">
                <button id="add-btn">Tambah</button>
            </div>

            <ul id="todo-list"></ul>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
